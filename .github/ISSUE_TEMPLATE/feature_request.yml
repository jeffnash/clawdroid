name: Feature request
description: Suggest a new capability or improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the desired behavior
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Any host, Waydroid, plugin, or agent constraints that matter
