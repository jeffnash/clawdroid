name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -r python-daemon/requirements.txt
          python -m pip install -r python-daemon/requirements-dev.txt

      - name: Run release checks
        run: ./scripts/release_check.sh

  android-companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -r python-daemon/requirements.txt
          python -m pip install -r python-daemon/requirements-dev.txt

      - name: Build Android companion APK
        run: ./scripts/release_check.sh --include-android-build
